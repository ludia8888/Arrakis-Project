# ArduPilot SITL (Software In The Loop) for integration testing
# Usage:
#   docker compose -f docker-compose.sitl.yml up -d sitl-quadplane
#   docker compose -f docker-compose.sitl.yml --profile copter up -d
#   docker compose -f docker-compose.sitl.yml down
#
# Connection:
#   ARRAKIS_ARDUPILOT_CONNECTION="tcp:127.0.0.1:5760"

services:
  sitl-quadplane:
    image: radarku/ardupilot-sitl:latest
    platform: linux/amd64
    ports:
      - "5760:5760"
      - "5762:5762"
    volumes:
      - ./sim_runtime/params/quadplane_demo.parm:/arrakis/quadplane_demo.parm:ro
    environment:
      - VEHICLE=ArduPlane
      - MODEL=quadplane
      - SPEEDUP=1
    entrypoint:
      - /bin/sh
      - -c
      - /ardupilot/Tools/autotest/sim_vehicle.py --vehicle $${VEHICLE} -I$${INSTANCE} --custom-location=$${LAT},$${LON},$${ALT},$${DIR} -w --frame $${MODEL} --no-rebuild --no-mavproxy --speedup $${SPEEDUP} --add-param-file /arrakis/quadplane_demo.parm
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5760 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  sitl-copter:
    image: radarku/ardupilot-sitl:latest
    platform: linux/amd64
    ports:
      - "5770:5760"
    environment:
      - VEHICLE=ArduCopter
      - MODEL=quad
      - SPEEDUP=1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5760 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    restart: unless-stopped
    profiles: ["copter"]
